[workspace]
resolver = "2"
members = ["alert-schema", "policy-model", "pairing-protocol"]

[workspace.package]
edition = "2021"
license = "GPL-3.0-or-later"
repository = "https://github.com/nicksavov/ai-parental-control"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
