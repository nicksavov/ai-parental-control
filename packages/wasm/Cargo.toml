[package]
name = "apc-wasm"
version = "0.1.0"
description = "WebAssembly bindings to the apc core so the parent PWA can decrypt alerts in the browser"
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
apc-alert = { path = "../alert-schema" }
apc-pairing = { path = "../pairing-protocol" }
serde = { workspace = true }
serde_json = { workspace = true }
base64 = "0.22"
wasm-bindgen = "=0.2.126"
# Use the browser/Node Web Crypto backend for randomness on wasm targets.
getrandom = { version = "0.2", features = ["js"] }
